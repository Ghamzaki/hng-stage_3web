name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check .

      - name: Check app imports
        run: python -c "from main import app; print('App OK')"
        env:
          BACKEND_URL: https://hng-stage-3-delta.vercel.app
          PORTAL_URL: https://hng-stage-3web.vercel.app